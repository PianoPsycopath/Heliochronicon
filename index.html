<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heliochronicon</title>

    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body oncontextmenu="return false;"> 

    <div id="crt-overlay"></div>

    <button id="btn-mobile-toggle">ACCESS TERMINAL</button>
    <div id="panel-left" class="panel">
        <h2>System Status</h2>
        <p style="color: #ffcc00; font-weight: bold; margin-bottom: 5px;">TARGET: <span id="current-target">NONE</span></p>
        <div class="tab-nav flex-row">
            <button id="btn-tab-search" class="tab-btn active">SEARCH</button>
            <button id="btn-tab-vis" class="tab-btn">VISIBILITY</button>
        </div>

        <div id="tab-search" class="tab-content active">
            <div class="control-group" style="margin-top: 10px;">
                <label>TACTICAL DATABASE</label>
                <input type="text" id="search-input" placeholder="SEARCH ALL (TEXT)...">
                <button id="sort-toggle" class="full-btn">SORT: DIST</button>
                <div id="body-list" class="scrollable-list" style="max-height: 50vh;"></div>
            </div>
        </div>

        <!-- TAB 2: VISIBILITY CONTENT -->
        <div id="tab-visibility" class="tab-content" style="overflow-y: auto; padding-right: 5px;">
            
            <!-- MAGI CIRCUIT BOARD -->
            <div class="control-group magi-board" style="padding: 10px 5px; margin-top: 10px;">
                <div class="magi-header" style="display:flex; justify-content:space-between; margin-bottom: 15px;">
                    <span>SYSTEM VISIBILITY</span>
                    <button id="btn-clear-map" class="danger-btn" style="width: auto; margin:0; font-size: 0.7rem; padding: 2px 5px;">PURGE MEMORY</button>
                </div>
                
                <!-- TWO-COLUMN CIRCUIT -->
                <div class="magi-circuit">
                    
                    <!-- ASTEROIDS (LEFT) -->
                    <div class="magi-column left-col">
                        <!-- MASTER OVERRIDE (Root of Asteroid Tree) -->
                        <div class="magi-row master-row" id="row-master-toggle" style="margin-bottom: 8px; justify-content: flex-end;">
                            <div class="magi-btn">
                                <div class="magi-status" style="width: 100%; justify-content: center;">
                                    <span class="magi-label" style="color: #000; font-size: 0.65rem;">ASTEROID TOGGLE</span>
                                </div>
                            </div>
                            <!-- Root SVG Stub -->
                            <svg class="magi-svg-wire">
                                <polyline points="0,1 15,1" />
                                <circle cx="0" cy="1" r="1.5" />
                                <circle cx="15" cy="1" r="1.5" />
                            </svg>
                        </div>
                        
                        <!-- Dynamic Asteroid List -->
                        <div id="dataset-list-asteroids" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>
                    
                    <!-- PLANETS & MOONS (RIGHT) -->
                    <div id="dataset-list-planets" class="magi-column right-col" style="gap: 8px;"></div>
                </div>
            </div>

            <!-- MOON FILTERS -->
            <div class="control-group">
                <label>MOON VIS (DIST AU) <span id="dist-val" style="float:right;color:#ffcc00">0.000 - 0.300</span></label>
                <div class="flex-row">
                    <input type="range" id="moon-dist-min" min="0" max="0.3" step="0.001" value="0">
                    <input type="range" id="moon-dist-max" min="0" max="0.3" step="0.001" value="0.3">
                </div>
     
                <label style="margin-top:10px;">MOON VIS (SIZE KM) <span id="size-val" style="float:right; color:#ffcc00">0 - 5000</span></label>
                <div class="flex-row">
                    <input type="range" id="moon-size-min" min="0" max="5000" step="1" value="0">
                    <input type="range" id="moon-size-max" min="0" max="5000" step="1" value="5000">
                </div>
            </div>
        </div>
    </div>

    <div id="panel-right" class="panel" id="telemetry">
        <h2>Telemetry</h2>
        <div id="telemetry-data">
            <p>AWAITING DATA INPUT...</p>
        </div>
    </div>
    <div id="bottom-deck">
        <div class="chrono-header">
            <button id="btn-live" class="active">LIVE</button>
            <textarea id="time-input-bottom"></textarea>
            <button id="btn-scan" class="radar-btn">
                <div class="ring outer"></div>
                <div class="ring inner"></div>
                <div class="sweep"></div>
            </button>
        </div>
        
        <div class="throttle-container">
            <button id="btn-time-rev" class="throttle-btn">◀◀</button>
            <button id="btn-time-pause" class="throttle-btn">▐▐</button>
            <input type="range" id="time-slider" min="0" max="20" step="1" value="11">
            <button id="btn-time-fwd" class="throttle-btn">▶▶</button>
            <button id="btn-time-1x" class="throttle-btn">1X</button>
        </div>
        <div id="throttle-label">1 SEC / SEC</div>
    </div>
    <div id="canvas-container"></div>

    <button id="btn-tutorial" title="Open Tutorial">?</button>

        <div id="tutorial-overlay">
            <svg id="tutorial-svg">
                <line id="tutorial-line" x1="0" y1="0" x2="0" y2="0" />
                <circle id="tutorial-dot" cx="0" cy="0" r="4" fill="#00ffff" />
            </svg>

            <div id="tutorial-box">
                <h3 id="tutorial-title">SYSTEM INIT</h3>
                <p id="tutorial-text">Welcome to the Heliochronicon.</p>
                <div class="tutorial-controls">
                    <span class="tutorial-hint">[CLICK/TAP TO CONTINUE]</span>
                    <button id="btn-skip-tutorial">SKIP</button>
                </div>
            </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="js/DataLoader.js"></script>
    <script src="js/Shaders.js"></script> 
    <script src="js/OrbitalMath.js"></script>
    <script src="js/PhysicsEngine.js"></script>
    <script src="js/UIController.js"></script>
    <script src="js/SceneManager.js"></script>
    <script src="js/TacticalScanner.js"></script>
    <script src="js/SystemBuilder.js"></script>
    <script src="js/InteractionController.js"></script>
    <script src="js/RenderPipeline.js"></script>
    <script src="js/TutorialManager.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
