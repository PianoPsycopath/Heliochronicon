<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heliochronicon</title>

    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body oncontextmenu="return false;"> 

    <div id="crt-overlay"></div>

    <button id="btn-mobile-toggle">ACCESS TERMINAL</button>
    <div id="panel-left" class="panel">
        <h2>System Status</h2>
        <p style="color: #ffcc00; font-weight: bold;">TARGET: <span id="current-target">NONE</span></p>
        <p style="font-size: 0.7rem;">[CLICK: SELECT TARGET]</p>
        <p style="font-size: 0.7rem;">[DRAG/PAN: MANUAL OVERRIDE]</p>
        
        <div class="control-group">
            <label>TACTICAL DATABASE</label>
            <input type="text" id="search-input" placeholder="SEARCH ALL (TEXT)...">
            <button id="sort-toggle" class="full-btn">SORT: DIST</button>
            <div id="body-list" class="scrollable-list"></div>
        </div>

        <div class="control-group">
            <label>MOON VIS (DIST AU) <span id="dist-val" style="float:right;color:#ffcc00">0.000 - 0.300</span></label>
            <div class="flex-row">
                <input type="range" id="moon-dist-min" min="0" max="0.3" step="0.001" value="0">
                <input type="range" id="moon-dist-max" min="0" max="0.3" step="0.001" value="0.3">
            </div>
 
            <label style="margin-top:10px;">MOON VIS (SIZE KM) <span id="size-val" style="float:right; color:#ffcc00">0 - 5000</span></label>
            <div class="flex-row">
                <input type="range" id="moon-size-min" min="0" max="5000" step="1" value="0">
                <input type="range" id="moon-size-max" min="0" max="5000" step="1" value="5000">
            </div>
        </div>

        <div class="control-group">
            <label>VISIBILITY SETTINGS</label>

            <div class="list-item flex-row" style="background: rgba(255, 204, 0, 0.1); border-bottom: 1px solid #ffcc00; margin-bottom: 5px;">
                <input type="checkbox" id="master-asteroid-toggle">
                <label for="master-asteroid-toggle" style="margin-left: 10px; font-weight: bold; flex-grow: 1; cursor: pointer;">TOGGLE ALL ASTEROIDS</label>
            </div>
            <div id="dataset-list" class="scrollable-list" style="margin-bottom: 15px; max-height: 200px;"></div>
            <button id="btn-clear-map" class="danger-btn">PURGE SYSTEM MEMORY</button>
        </div>
    </div>

    <div id="panel-right" class="panel" id="telemetry">
        <h2>Telemetry</h2>
        <div id="telemetry-data">
            <p>AWAITING DATA INPUT...</p>
        </div>
    </div>
    <div id="bottom-deck">
        <div class="chrono-header">
            <button id="btn-live">LIVE</button>
            <input type="text" id="time-input-bottom" value="">
            <button id="btn-scan" class="radar-btn">
                <div class="ring outer"></div>
                <div class="ring inner"></div>
                <div class="sweep"></div>
            </button>
        </div>
        
        <div class="throttle-container">
            <button id="btn-time-rev" class="throttle-btn">◀◀</button>
            <button id="btn-time-pause" class="throttle-btn">▐▐</button>
            <input type="range" id="time-slider" min="0" max="20" step="1" value="11">
            <button id="btn-time-fwd" class="throttle-btn">▶▶</button>
            <button id="btn-time-1x" class="throttle-btn">1X</button>
        </div>
        <div id="throttle-label">1 SEC / SEC</div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="js/DataLoader.js"></script>
    <script src="js/Shaders.js"></script> 
    <script src="js/OrbitalMath.js"></script>
    <script src="js/PhysicsEngine.js"></script>
    <script src="js/UIController.js"></script>
    <script src="js/SceneManager.js"></script>
    <script src="js/TacticalScanner.js"></script>
    <script src="js/SystemBuilder.js"></script>
    <script src="js/InteractionController.js"></script>
    <script src="js/RenderPipeline.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
